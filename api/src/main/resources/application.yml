      matching-strategy: ant_path_matcher
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://45.207.193.206:3306/coin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: JGHbtyh9892h
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    packages-to-scan:
      - com.cryptotrade.user.entity
      - com.cryptotrade.wallet.entity
      - com.cryptotrade.spot.entity
      - com.cryptotrade.futures.usdt.entity
      - com.cryptotrade.futures.coin.entity
      - com.cryptotrade.robot.entity
    entity-scan:
      - com.cryptotrade.user.entity
      - com.cryptotrade.wallet.entity
      - com.cryptotrade.spot.entity
      - com.cryptotrade.futures.usdt.entity
      - com.cryptotrade.futures.coin.entity
      - com.cryptotrade.robot.entity
  redis:
    host: 45.207.193.206
    port: 6379
    password: 
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 2KB

server:
  port: 8080
  servlet:
    context-path: /api
  # 文件上传配置
  max-file-size: 10MB
  max-request-size: 50MB

# JWT配置
jwt:
  secret: crypto-exchange-secret-key-2024
  expiration: 86400000  # 24小时

# 验证码配置
verification:
  code:
    expire: 300  # 5分钟
    length: 6

# Swagger配置 - 暂时禁用以解决兼容性问题
springfox:
  documentation:
    enabled: false
    swagger-ui:
      enabled: false
      path: /swagger-ui.html

# Actuator 配置 - 禁用安全管理
management:
  security:
    enabled: false
